<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Clone com Supabase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.21.4/babel.min.js"></script>
    <style>
        .message-bubble { max-width: 70%; word-wrap: break-word; }
        .my-message { background-color: #005c4b; color: white; border-radius: 7.5px 7.5px 0 7.5px; }
        .other-message { background-color: #202c33; color: white; border-radius: 7.5px 7.5px 7.5px 0; }
        .contact-item:hover { background-color: #2a3942; }
        .active-contact { background-color: #2a3942; border-left: 4px solid #00a884; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1f2c33; }
        ::-webkit-scrollbar-thumb { background: #394b54; border-radius: 3px; }
    </style>
</head>
<body class="bg-[#0b141a] text-white">
    <div id="root"></div>

    <script type="text/babel">
        // ========== CONFIGURAÇÃO DO SUPABASE ==========
        // COLE AQUI SUAS CREDENCIAIS DO SUPABASE
        const SUPABASE_URL = 'https://cghhhmrkbrlgvwwjumjc.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_bOK93qG23ijZ1-9XfTzv1A_ZbPEx13N';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ========== CONTEXTO DE AUTENTICAÇÃO ==========
        const AuthContext = React.createContext();

        function AuthProvider({ children }) {
            const [user, setUser] = React.useState(null);
            const [loading, setLoading] = React.useState(true);

            React.useEffect(() => {
                // Verifica sessão atual
                supabase.auth.getSession().then(({ data: { session } }) => {
                    if (session?.user) {
                        // Busca perfil completo
                        supabase.from('profiles').select('*').eq('id', session.user.id).single()
                            .then(({ data }) => setUser({ ...session.user, profile: data }));
                    }
                    setLoading(false);
                });

                // Listener de mudanças na autenticação
                const { data: listener } = supabase.auth.onAuthStateChange(async (event, session) => {
                    if (session?.user) {
                        const { data } = await supabase.from('profiles').select('*').eq('id', session.user.id).single();
                        setUser({ ...session.user, profile: data });
                    } else {
                        setUser(null);
                    }
                });

                return () => listener?.subscription.unsubscribe();
            }, []);

            const login = async (email, password) => {
                const { error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) throw error;
            };

            const register = async (name, email, password) => {
                const { error } = await supabase.auth.signUp({
                    email,
                    password,
                    options: { data: { name } }
                });
                if (error) throw error;
            };

            const logout = async () => {
                await supabase.auth.signOut();
            };

            return (
                <AuthContext.Provider value={{ user, login, register, logout, loading }}>
                    {children}
                </AuthContext.Provider>
            );
        }

        // ========== TELA DE LOGIN / REGISTRO ==========
        function AuthScreen() {
            const [isLogin, setIsLogin] = React.useState(true);
            const [email, setEmail] = React.useState('');
            const [password, setPassword] = React.useState('');
            const [name, setName] = React.useState('');
            const [error, setError] = React.useState('');
            const [loading, setLoading] = React.useState(false);
            const { login, register } = React.useContext(AuthContext);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');
                setLoading(true);
                try {
                    if (isLogin) {
                        await login(email, password);
                    } else {
                        await register(name, email, password);
                    }
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4 bg-[#0b141a]">
                    <div className="bg-[#1f2c33] p-8 rounded-2xl w-full max-w-md border border-gray-600">
                        <div className="text-center mb-8">
                            <i className="fab fa-whatsapp text-5xl text-[#00a884]"></i>
                            <h1 className="text-2xl font-bold mt-2">WhatsApp Clone</h1>
                        </div>
                        <form onSubmit={handleSubmit} className="space-y-4">
                            {!isLogin && (
                                <div>
                                    <label className="block text-sm text-gray-400 mb-1">Nome</label>
                                    <input
                                        type="text"
                                        value={name}
                                        onChange={(e) => setName(e.target.value)}
                                        className="w-full bg-[#2a3942] border border-gray-600 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#00a884]"
                                        required
                                    />
                                </div>
                            )}
                            <div>
                                <label className="block text-sm text-gray-400 mb-1">E-mail</label>
                                <input
                                    type="email"
                                    value={email}
                                    onChange={(e) => setEmail(e.target.value)}
                                    className="w-full bg-[#2a3942] border border-gray-600 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#00a884]"
                                    required
                                />
                            </div>
                            <div>
                                <label className="block text-sm text-gray-400 mb-1">Senha</label>
                                <input
                                    type="password"
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    className="w-full bg-[#2a3942] border border-gray-600 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#00a884]"
                                    required
                                />
                            </div>
                            {error && <p className="text-red-400 text-sm">{error}</p>}
                            <button
                                type="submit"
                                disabled={loading}
                                className="w-full bg-[#00a884] hover:bg-[#008f72] text-white font-medium py-2 rounded-lg transition disabled:opacity-50"
                            >
                                {loading ? 'Processando...' : (isLogin ? 'Entrar' : 'Cadastrar')}
                            </button>
                        </form>
                        <p className="text-center text-sm text-gray-400 mt-4">
                            {isLogin ? 'Não tem conta? ' : 'Já tem conta? '}
                            <button onClick={() => setIsLogin(!isLogin)} className="text-[#00a884] hover:underline">
                                {isLogin ? 'Cadastre-se' : 'Faça login'}
                            </button>
                        </p>
                    </div>
                </div>
            );
        }

        // ========== COMPONENTES DO CHAT ==========
        function ChatItem({ contact, isActive, onClick, lastMessage, unread }) {
            return (
                <div
                    onClick={onClick}
                    className={`contact-item p-3 cursor-pointer flex items-center gap-3 ${isActive ? 'active-contact' : ''}`}
                >
                    <div className="relative">
                        <div className="w-12 h-12 bg-[#2a3942] rounded-full flex items-center justify-center text-xl">
                            {contact.name?.[0]?.toUpperCase() || '?'}
                        </div>
                        <span className={`absolute bottom-0 right-0 w-3 h-3 rounded-full border-2 border-[#1f2c33] ${contact.status === 'online' ? 'bg-green-500' : 'bg-gray-500'}`}></span>
                    </div>
                    <div className="flex-1 min-w-0">
                        <div className="flex justify-between items-baseline">
                            <h3 className="font-medium truncate">{contact.name}</h3>
                            {lastMessage && (
                                <span className="text-xs text-gray-400">
                                    {new Date(lastMessage.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}
                                </span>
                            )}
                        </div>
                        <div className="flex justify-between items-center">
                            <p className="text-sm text-gray-400 truncate">
                                {lastMessage ? (lastMessage.sender_id === contact.id ? lastMessage.content : `Você: ${lastMessage.content}`) : 'Nenhuma mensagem'}
                            </p>
                            {unread > 0 && (
                                <span className="bg-[#00a884] text-white text-xs rounded-full px-2 py-0.5">{unread}</span>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function MessageBubble({ message, isMe }) {
            return (
                <div className={`flex ${isMe ? 'justify-end' : 'justify-start'}`}>
                    <div className={`message-bubble px-3 py-2 ${isMe ? 'my-message' : 'other-message'}`}>
                        <p>{message.content}</p>
                        <div className="flex justify-end items-center gap-1 mt-1 text-xs text-gray-300">
                            <span>{new Date(message.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
                            {isMe && (
                                <span>
                                    {message.delivered ? (message.seen ? <i className="fas fa-check-double"></i> : <i className="fas fa-check"></i>) : <i className="fas fa-clock"></i>}
                                </span>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function ChatApp() {
            const { user, logout } = React.useContext(AuthContext);
            const [contacts, setContacts] = React.useState([]);
            const [selectedContact, setSelectedContact] = React.useState(null);
            const [messages, setMessages] = React.useState([]);
            const [inputText, setInputText] = React.useState('');
            const [otherTyping, setOtherTyping] = React.useState(false);
            const [searchTerm, setSearchTerm] = React.useState('');
            const [searchResults, setSearchResults] = React.useState([]);
            const [showAddContact, setShowAddContact] = React.useState(false);
            const messagesEndRef = React.useRef(null);

            // Carregar contatos (apenas os que estão na tabela contacts)
            React.useEffect(() => {
                if (!user) return;
                loadContacts();
            }, [user]);

            const loadContacts = async () => {
                // Busca os contatos do usuário atual com os dados do perfil
                const { data } = await supabase
                    .from('contacts')
                    .select('contact_id, profiles!contacts_contact_id_fkey(*)')
                    .eq('user_id', user.id);
                setContacts(data?.map(item => item.profiles) || []);
            };

            // Buscar usuários para adicionar
            const searchUsers = async (term) => {
                if (term.length < 2) return setSearchResults([]);
                const { data } = await supabase
                    .from('profiles')
                    .select('*')
                    .ilike('name', `%${term}%`)
                    .neq('id', user.id)
                    .limit(10);
                setSearchResults(data || []);
            };

            const addContact = async (contactId) => {
                // Verifica se já é contato
                const { data: existing } = await supabase
                    .from('contacts')
                    .select('*')
                    .eq('user_id', user.id)
                    .eq('contact_id', contactId)
                    .maybeSingle();

                if (!existing) {
                    await supabase.from('contacts').insert({ user_id: user.id, contact_id: contactId });
                    // Adiciona também o inverso para comunicação bidirecional
                    await supabase.from('contacts').insert({ user_id: contactId, contact_id: user.id });
                }
                setShowAddContact(false);
                setSearchTerm('');
                loadContacts();
            };

            // Carregar mensagens com o contato selecionado
            React.useEffect(() => {
                if (!selectedContact || !user) return;

                const loadMessages = async () => {
                    const { data } = await supabase
                        .from('messages')
                        .select('*')
                        .or(`and(sender_id.eq.${user.id},receiver_id.eq.${selectedContact.id}),and(sender_id.eq.${selectedContact.id},receiver_id.eq.${user.id})`)
                        .order('created_at', { ascending: true });
                    setMessages(data || []);
                };
                loadMessages();

                // Inscrever para novas mensagens em tempo real
                const subscription = supabase
                    .channel('public:messages')
                    .on('postgres_changes', {
                        event: 'INSERT',
                        schema: 'public',
                        table: 'messages',
                        filter: `sender_id=eq.${selectedContact.id},receiver_id=eq.${user.id}`
                    }, (payload) => {
                        setMessages(prev => [...prev, payload.new]);
                    })
                    .subscribe();

                return () => {
                    subscription.unsubscribe();
                };
            }, [selectedContact, user]);

            // Scroll automático
            React.useEffect(() => {
                messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages]);

            const sendMessage = async (e) => {
                e.preventDefault();
                if (!inputText.trim() || !selectedContact) return;

                const { data, error } = await supabase
                    .from('messages')
                    .insert({
                        sender_id: user.id,
                        receiver_id: selectedContact.id,
                        content: inputText,
                        delivered: true,
                        seen: false
                    })
                    .select()
                    .single();

                if (!error) {
                    setMessages(prev => [...prev, data]);
                    setInputText('');
                }
            };

            return (
                <div className="flex h-screen bg-[#0b141a]">
                    {/* Sidebar */}
                    <div className="w-80 bg-[#1f2c33] border-r border-gray-700 flex flex-col">
                        <div className="p-4 border-b border-gray-700 flex justify-between items-center">
                            <div className="flex items-center gap-2">
                                <div className="w-10 h-10 bg-[#2a3942] rounded-full flex items-center justify-center">
                                    {user?.profile?.name?.[0]?.toUpperCase()}
                                </div>
                                <span className="font-medium">{user?.profile?.name}</span>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => setShowAddContact(true)} className="text-gray-400 hover:text-white">
                                    <i className="fas fa-user-plus"></i>
                                </button>
                                <button onClick={logout} className="text-gray-400 hover:text-white">
                                    <i className="fas fa-sign-out-alt"></i>
                                </button>
                            </div>
                        </div>

                        {/* Busca de contatos (já adicionados) */}
                        <div className="p-2">
                            <div className="relative">
                                <i className="fas fa-search absolute left-3 top-3 text-gray-400 text-sm"></i>
                                <input
                                    type="text"
                                    placeholder="Pesquisar conversas"
                                    className="w-full bg-[#2a3942] rounded-lg pl-10 pr-4 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-[#00a884]"
                                />
                            </div>
                        </div>

                        {/* Lista de contatos */}
                        <div className="flex-1 overflow-y-auto">
                            {contacts.map(contact => {
                                // Última mensagem com este contato
                                const lastMsg = messages.filter(m => m.sender_id === contact.id || m.receiver_id === contact.id).slice(-1)[0];
                                const unread = messages.filter(m => m.sender_id === contact.id && !m.seen).length;
                                return (
                                    <ChatItem
                                        key={contact.id}
                                        contact={contact}
                                        isActive={selectedContact?.id === contact.id}
                                        onClick={() => setSelectedContact(contact)}
                                        lastMessage={lastMsg}
                                        unread={unread}
                                    />
                                );
                            })}
                        </div>

                        {/* Modal de adicionar contato */}
                        {showAddContact && (
                            <div className="absolute inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
                                <div className="bg-[#1f2c33] rounded-lg p-6 w-full max-w-md">
                                    <h3 className="text-lg font-medium mb-4">Adicionar contato</h3>
                                    <input
                                        type="text"
                                        placeholder="Buscar por nome..."
                                        value={searchTerm}
                                        onChange={(e) => {
                                            setSearchTerm(e.target.value);
                                            searchUsers(e.target.value);
                                        }}
                                        className="w-full bg-[#2a3942] border border-gray-600 rounded-lg px-4 py-2 mb-4 focus:outline-none focus:ring-2 focus:ring-[#00a884]"
                                    />
                                    <div className="max-h-60 overflow-y-auto space-y-2">
                                        {searchResults.map(u => (
                                            <div key={u.id} className="flex items-center justify-between p-2 hover:bg-[#2a3942] rounded">
                                                <div className="flex items-center gap-2">
                                                    <div className="w-8 h-8 bg-[#2a3942] rounded-full flex items-center justify-center">
                                                        {u.name[0]?.toUpperCase()}
                                                    </div>
                                                    <span>{u.name}</span>
                                                </div>
                                                <button
                                                    onClick={() => addContact(u.id)}
                                                    className="bg-[#00a884] hover:bg-[#008f72] text-white px-3 py-1 rounded text-sm"
                                                >
                                                    Adicionar
                                                </button>
                                            </div>
                                        ))}
                                        {searchResults.length === 0 && searchTerm.length > 1 && (
                                            <p className="text-gray-400 text-center">Nenhum usuário encontrado</p>
                                        )}
                                    </div>
                                    <button
                                        onClick={() => setShowAddContact(false)}
                                        className="mt-4 w-full bg-gray-600 hover:bg-gray-700 text-white py-2 rounded"
                                    >
                                        Fechar
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Área de chat */}
                    <div className="flex-1 flex flex-col bg-[#222e35]">
                        {selectedContact ? (
                            <>
                                {/* Header */}
                                <div className="p-4 border-b border-gray-700 flex items-center gap-3">
                                    <div className="relative">
                                        <div className="w-10 h-10 bg-[#2a3942] rounded-full flex items-center justify-center">
                                            {selectedContact.name[0]?.toUpperCase()}
                                        </div>
                                        <span className={`absolute bottom-0 right-0 w-3 h-3 rounded-full border-2 border-[#222e35] ${selectedContact.status === 'online' ? 'bg-green-500' : 'bg-gray-500'}`}></span>
                                    </div>
                                    <div>
                                        <h3 className="font-medium">{selectedContact.name}</h3>
                                        <p className="text-xs text-gray-400">
                                            {selectedContact.status === 'online' ? 'online' : 'visto por último'}
                                        </p>
                                    </div>
                                </div>

                                {/* Mensagens */}
                                <div className="flex-1 overflow-y-auto p-4 space-y-2">
                                    {messages.map(msg => (
                                        <MessageBubble key={msg.id} message={msg} isMe={msg.sender_id === user.id} />
                                    ))}
                                    <div ref={messagesEndRef} />
                                </div>

                                {/* Input */}
                                <form onSubmit={sendMessage} className="p-4 border-t border-gray-700 flex gap-2">
                                    <input
                                        type="text"
                                        value={inputText}
                                        onChange={(e) => setInputText(e.target.value)}
                                        placeholder="Digite uma mensagem"
                                        className="flex-1 bg-[#2a3942] rounded-lg px-4 py-2 focus:outline-none focus:ring-1 focus:ring-[#00a884]"
                                    />
                                    <button type="submit" className="bg-[#00a884] hover:bg-[#008f72] text-white px-4 py-2 rounded-lg">
                                        <i className="fas fa-paper-plane"></i>
                                    </button>
                                </form>
                            </>
                        ) : (
                            <div className="flex-1 flex flex-col items-center justify-center text-gray-400">
                                <i className="fab fa-whatsapp text-7xl mb-4 opacity-20"></i>
                                <p>Selecione um contato para começar a conversar</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ========== COMPONENTE PRINCIPAL ==========
        function App() {
            const { user, loading } = React.useContext(AuthContext);
            if (loading) {
                return <div className="min-h-screen flex items-center justify-center">Carregando...</div>;
            }
            return user ? <ChatApp /> : <AuthScreen />;
        }

        // Render
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <AuthProvider>
                <App />
            </AuthProvider>
        );
    </script>
</body>
</html>
